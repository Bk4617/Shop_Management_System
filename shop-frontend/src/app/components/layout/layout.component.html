<div class="layout-container">
  
  <!-- Sidebar Navigation -->
  <aside class="sidebar glass-panel">
    
    <!-- Sidebar Logo -->
    <div class="sidebar-brand">
      <span class="material-symbols-outlined logo-icon">storefront</span>
      <div class="brand-text">
        <h3>Apex Shop</h3>
        <span>Management</span>
      </div>
    </div>

    <!-- User Profile Summary (Clickable) -->
    <div class="user-profile clickable" *ngIf="currentUser()" [routerLink]="['/profile']" title="View profile & edit details">
      <div class="avatar">
        <span class="material-symbols-outlined">account_circle</span>
      </div>
      <div class="user-info">
        <span class="user-name">{{ currentUser()?.name }}</span>
        <span class="user-role">Administrator</span>
      </div>
      <span class="material-symbols-outlined settings-icon" style="margin-left: auto; color: var(--text-muted); font-size: 1.25rem;">settings</span>
    </div>

    <!-- Navigation Links -->
    <nav class="nav-menu">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined">dashboard</span>
        <span>Dashboard</span>
      </a>

      <a routerLink="/products" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined">inventory_2</span>
        <span>Inventory</span>
      </a>

      <a routerLink="/sales" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined">point_of_sale</span>
        <span>Sales POS</span>
      </a>
    </nav>

    <!-- Logout Action -->
    <div class="sidebar-footer">
      <button (click)="logout()" class="btn btn-danger w-full logout-btn">
        <span class="material-symbols-outlined">logout</span>
        <span>Log Out</span>
      </button>
    </div>

  </aside>

  <!-- Main Viewport Area -->
  <main class="main-content">
    
    <!-- Top Header -->
    <header class="main-header glass-panel">
      <div class="header-welcome">
        <h2>Welcome back, <span class="text-gradient-primary clickable" [routerLink]="['/profile']" title="View profile & edit details">{{ currentUser()?.name }}</span>!</h2>
        <p>Operational overview of the systems</p>
      </div>
      <div class="header-status">
        <span class="badge badge-success">
          <span class="status-dot"></span> System Online
        </span>
      </div>
    </header>

    <!-- Nested Components Router Outlet -->
    <div class="router-content animate-fade-in">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
